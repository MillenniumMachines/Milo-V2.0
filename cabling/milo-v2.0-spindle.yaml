metadata:
  title: "Milo V2.0 Spindle Power and Control"
  description: |
    Milo V2.0 provides single phase 110v or 220v AC power to a 48v PSU and a VFD,
    for spindle control. The AC power to the VFD is controlled by a 3-pole contactor,
    which is triggered by an Emergency Stop circuit. The Spindle is directly connected
    to the VFD and grounded, with a cable shield for noise reduction.

connectors: *common-connectors

cables:
  AC: *ac-power-cable

  AC-NG: # AC with no ground
    <<: *ac-power-cable
    color: GY
    wirecount: 2

  MODBUS:
    wirecount: 2
    length: 1
    colors: [RD, BK]
    color: RDBK

  TO-SPINDLE:
    gauge: 14 AWG
    length: 1
    colors: [BN, BU, RD, YEGN]
    color: BK
    wirecount: 4
    shield: true
    show_equiv: true

connections:
  # External to VFD Power
  -
    - EXT.AC-L: 1
    - -->
    - VFD: 1
  -
    - EXT.AC-N: 1
    - -->
    - VFD: 2
  -
    - EXT.AC-PE: 1
    - -->
    - VFD: 7

  # Spindle
  - # VFD to Spindle
    - VFD: [4-7]
    - <--
    - FB.
    - TO-SPINDLE: [1-4]
    - SPINDLE-CONNECTOR: [1-4]
    - -->
    - SPINDLE: [1-4]
  - # Spindle Cable Shield to VFD GND
    - VFD: 7
    - <--
    - SOLDERED.
    - TO-SPINDLE: s

  # Modbus over RS485
  -
    - MAINBOARD: [35-36]
    - <--
    - FA.
    - MODBUS: [1-2]
    - FA.
    - -->
    - VFD: [15-16]

