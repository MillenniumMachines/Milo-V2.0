metadata:
  title: "Milo V2.0 Emergency Stop"
  description: |
    Milo V2.0 utilises 2 emergency stop circuits, implemented using 2
    normally closed switches on each emergency stop button. The first
    circuit is used to trigger the contactor, which cuts power to the
    VFD (pins 1-4) and motors (pins 5-6). The second circuit is used
    to send an emergency stop signal to the mainboard, which triggers
    an emergency stop in RepRapFirmware and allows the operator to
    investigate before rebooting.

connectors:
  <<: *common-connectors
  A-MIN-A:
    <<: *endstop-connector-a

cables:
  ES1:
    wirecount: 1
    length: 1
    color: OG
    colors: [OG]
  ES2:
    wirecount: 1
    length: 1
    color: YE
    colors: [YE]

connections:
  # Emergency Stop Circuit 1
  - # PSU +48V to Emergency Stop #1
    - 48V-PSU: 8
    - <--
    - FT.
    - ES1.
    - FT.
    - -->
    - EMERGENCY-STOP: 1

  - # Emergency Stop #1 to Contactor Trigger ABC+
    - EMERGENCY-STOP: 2
    - <--
    - FT.
    - ES1.
    - FT.
    - -->
    - CONTACTOR: 7

  - # Contactor Trigger ABC- to PSU GND
    - 48V-PSU: 5
    - <--
    - FT.
    - ES1.
    - FT.
    - -->
    - CONTACTOR: 8

  # Emergency Stop Circuit 2
  - # A-MIN-A to Emergency Stop #1
    - EMERGENCY-STOP: 3
    - <--
    - FT.
    - ES2.
    - FT.
    - -->
    - A-MIN-A: 3

  - # Emergency Stop #1 to A-MIN-A
    - EMERGENCY-STOP: 4
    - <--
    - FT.
    - ES2.
    - FT.
    - -->
    - A-MIN-A: 1
  - # Mainboard to A-MIN-A
    - A-MIN-A: [1-3]
    - -->
    - MAINBOARD: [22-24]

  # External Contactor Connections
  # Motor Power
  -
    - EXT.+48V-FROM-PSU
    - -->
    - CONTACTOR: 5

  -
    - CONTACTOR: 6
    - -->
    - EXT.48V-TO-MAINBOARD-PORT-V-MOT-VCC

  # VFD Power
  -
    - EXT.L-FROM-MAINS
    - -->
    - CONTACTOR: 1

  -
    - CONTACTOR: 2
    - -->
    - EXT.L-TO-VFD

  -
    - EXT.N-FROM-MAINS
    - -->
    - CONTACTOR: 3

  -
    - CONTACTOR: 4
    - -->
    - EXT.N-TO-VFD
