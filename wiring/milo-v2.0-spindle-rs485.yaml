metadata:
  title: "Milo V2.0 Spindle Power and Control (RS485 / Modbus)"
  description: |
    Milo V2.0 with the Scylla V1.0 mainboard can control a VFD via RS485, which
    is the simplest and most reliable way for 2-way communication between the
    mainboard and the VFD. This setup should be used in most cases if supported
    by the firmware and the VFD.

connectors: *common-connectors

cables:
  AC: *ac-power-cable

  AC-NG: # AC with no ground
    <<: *ac-power-cable
    color: GY
    wirecount: 2

  MODBUS:
    wirecount: 2
    length: 1
    colors: [RD, BK]
    color: RDBK

  TO-SPINDLE:
    gauge: 16 AWG
    length: 1
    colors: [BN, BU, RD, YEGN]
    color: BK
    wirecount: 4
    shield: true
    show_equiv: true

connections:
  # Spindle
  - # VFD to Spindle
    - VFD: [4-7]
    - <--
    - FB.
    - TO-SPINDLE: [1-4]
    - SPINDLE-CONNECTOR: [1-4]
    - -->
    - SPINDLE: [1-4]
  - # Spindle Cable Shield to VFD GND
    - VFD: 7
    - <--
    - FB.
    - --
    - SOLDERED.
    - TO-SPINDLE: s

  # Modbus over RS485
  -
    - MAINBOARD: [37-38]
    - <--
    - FA.
    - MODBUS: [1-2]
    - FA.
    - -->
    - VFD: [15-16]

