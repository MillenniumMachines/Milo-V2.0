metadata:
  title: "Milo V2.0 Emergency Stop"
  description: |
    Milo V2.0 utilises 2 emergency stop circuits, implemented using 2 normally closed switches on each emergency stop button. The first circuit is used to trigger the contactor, which cuts power to the VFD and motors. The second circuit is used to send an emergency stop signal to the mainboard, which triggers a stop or pause in RepRapFirmware and allows the operator to investigate before rebooting.

connectors:
  <<: *common-connectors
  IO-IN:
    <<: *endstop-connector-a

cables:
  ES1:
    wirecount: 1
    length: 1
    color: OG
    colors: [OG]
  ES2:
    wirecount: 1
    length: 1
    color: YE
    colors: [YE]

connections:
  # Emergency Stop Circuit 1
  - # PSU +24V to Emergency Stop #1
    - 24V-PSU: 9
    - <--
    - FT.
    - ES1.
    - FT.
    - -->
    - EMERGENCY-STOP: 1

  - # Emergency Stop #1 to Contactor Trigger ABC+
    - EMERGENCY-STOP: 2
    - <--
    - FT.
    - ES1.
    - FT.
    - -->
    - CONTACTOR: 8

  - # Contactor Trigger ABC- to PSU GND
    - 24V-PSU: 8
    - <--
    - FT.
    - ES1.
    - FT.
    - -->
    - CONTACTOR: 7

  # Emergency Stop Circuit 2
  - # IO-IN to Emergency Stop #1
    - EMERGENCY-STOP: 3
    - <--
    - FT.
    - ES2.
    - IO-IN: 1

  - # Emergency Stop #1 to IO-IN
    - EMERGENCY-STOP: 4
    - <--
    - FT.
    - ES2.
    - IO-IN: 2

  - # Mainboard to IO-IN
    - IO-IN: [1,2]
    - -->
    - MAINBOARD: [39,41]
