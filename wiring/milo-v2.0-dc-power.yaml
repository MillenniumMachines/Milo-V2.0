metadata:
  title: "Milo V2.0 DC Power"
  description: |
    Milo V2.0 provides 24v and 48v DC power via a 110-220v to 48v PSU and
    a 110-220v to 24v PSU. 24V power is used for the mainboard itself,
    auxiliary mosfet-controlled circuits, and the emergency stop circuit
    that triggers the contactor. 48V power is used for the motors only.

connectors: *common-connectors

cables:
  VCC:
    wirecount: 1
    length: 1
    colors: [RD]
    color: BK
  GND:
    wirecount: 1
    length: 1
    colors: [BK]
    color: BK

connections:
  # Motor Power

  - # 48V PSU + to V-MOT
    - 48V-PSU: 4
    - <--
    - FT.
    - VCC.
    - FB.
    - -->
    - MAINBOARD: 31

  - # 48V PSU - to V-MOT
    - 48V-PSU: 5
    - <--
    - FT.
    - GND.
    - FB.
    - -->
    - MAINBOARD: 32

  - # 24V PSU + to V-MCU
    - 24V-PSU: 4
    - <--
    - FT.
    - VCC.
    - FB.
    - -->
    - MAINBOARD: 33

  - # 24V PSU - to V-MCU
    - 24V-PSU: 5
    - <--
    - FT.
    - GND.
    - FB.
    - -->
    - MAINBOARD: 34

  - # 24V PSU + to V-MOS
    - 24V-PSU: 6
    - <--
    - FT.
    - VCC.
    - FB.
    - -->
    - MAINBOARD: 35

  - # 24V PSU - to V-MOS
    - 24V-PSU: 7
    - <--
    - FT.
    - GND.
    - FB.
    - -->
    - MAINBOARD: 36