metadata:
  title: "Milo V2.0 DC Power"
  description: |
    Milo V2.0 provides 48v DC power via a 110-220v to 48v PSU. Power is
    distributed to the mainboard, directly for the MCU itself, and via the
    3rd pole of a contactor for powering the motors. The contactor is
    triggered by an Emergency Stop circuit.

connectors: *common-connectors

cables:
  VCC:
    wirecount: 1
    length: 1
    colors: [RD]
    color: BK
  GND:
    wirecount: 1
    length: 1
    colors: [BK]
    color: BK

connections:
  # Motor Power

  - # 48V PSU + to V-MOT
    - 48V-PSU: 4
    - <--
    - FT.
    - VCC.
    - FB.
    - -->
    - MAINBOARD: 31

  - # 48V PSU - to V-MOT
    - 48V-PSU: 5
    - <--
    - FT.
    - GND.
    - FB.
    - -->
    - MAINBOARD: 32

  - # 24V PSU + to V-MCU
    - 24V-PSU: 4
    - <--
    - FT.
    - VCC.
    - FB.
    - -->
    - MAINBOARD: 33

  - # 24V PSU - to V-MCU
    - 24V-PSU: 5
    - <--
    - FT.
    - GND.
    - FB.
    - -->
    - MAINBOARD: 34

  - # 24V PSU + to V-MOS
    - 24V-PSU: 6
    - <--
    - FT.
    - VCC.
    - FB.
    - -->
    - MAINBOARD: 35

  - # 24V PSU - to V-MOS
    - 24V-PSU: 7
    - <--
    - FT.
    - GND.
    - FB.
    - -->
    - MAINBOARD: 36