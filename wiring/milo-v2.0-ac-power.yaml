metadata:
  title: "Milo V2.0 AC Power"
  description: |
    Milo V2.0 provides single phase 110v or 220v AC power to a 24v PSU, a 48v PSU and
    a VFD, for spindle control. The AC power to the VFD and 48v PSU is controlled by
    a contactor, which is triggered by an Emergency Stop circuit. The Spindle is
    directly connected to the VFD and grounded, with a cable shield for noise reduction.

connectors: *common-connectors

cables:
  AC: *ac-power-cable

  AC-NG: # AC with no ground
    <<: *ac-power-cable
    color: GY
    wirecount: 2

  TO-SPINDLE:
    gauge: 14 AWG
    length: 1
    colors: [BN, BU, RD, YEGN]
    color: BK
    wirecount: 4
    shield: true
    show_equiv: true

connections:
  # AC Input
  - # Socket to Wire
    - SOCKET: [1-3]
    - <--
    - FS.
    - AC.AC-BUS: [1-3]

  - # L to L WAGO
    - AC.AC-BUS: 1
    - FB.
    - -->
    - WAGO5.AC-L: 1

  - # N to N WAGO
    - AC.AC-BUS: 2
    - FB.
    - -->
    - WAGO5.AC-N: 1

  - # PE to PE WAGO
    - AC.AC-BUS: 3
    - FB.
    - -->
    - WAGO5.AC-PE: 1

  # 24V PSU
  - # L to Wire
    - WAGO5.AC-L: 1
    - <--
    - FB.
    - AC.TO-24V-PSU: 1

  - # N to Wire
    - WAGO5.AC-N: 1
    - <--
    - FB.
    - AC.TO-24V-PSU: 2

  - # PE to Wire
    - WAGO5.AC-PE: 1
    - <--
    - FB.
    - AC.TO-24V-PSU: 3

  # Contactor, VFD
  - # L to Wire
    - WAGO5.AC-L: 1
    - <--
    - FB.
    - AC-NG.TO-CONTACTOR-FOR-VFD: 1

  - # N to Wire
    - WAGO5.AC-N: 1
    - <--
    - FB.
    - AC-NG.TO-CONTACTOR-FOR-VFD: 2

  - # Wire to Contactor
    - AC-NG.TO-CONTACTOR-FOR-VFD: [1,2]
    - FT.
    - -->
    - CONTACTOR: [1,2]

  # Contactor, 48v PSU
  - # L to Wire
    - WAGO5.AC-L: 1
    - <--
    - FB.
    - AC-NG.TO-CONTACTOR-FOR-48V-PSU: 1

  - # N to Wire
    - WAGO5.AC-N: 1
    - <--
    - FB.
    - AC-NG.TO-CONTACTOR-FOR-48V-PSU: 2

  - # Wire to Contactor
    - AC-NG.TO-CONTACTOR-FOR-48V-PSU: [1,2]
    - FT.
    - -->
    - CONTACTOR: [3,4]


  # External Connections

  # 24V PSU
  # Wire to EXT PSU
  - # 24V PSU Wire to 24V PSU
    - AC.TO-24V-PSU: [1-3]
    - FB.
    - -->
    - 24V-PSU: [1-3]

  # 48V PSU
  - # Contactor to PSU Wire
    - CONTACTOR: [3,4]
    - <--
    - FB.
    - AC.TO-48V-PSU: [1,2]

  - # PE WAGO to 48V PSU Wire
    - WAGO5.AC-PE: 1
    - <--
    - FB.
    - AC.TO-48V-PSU: 3

  - # 48V PSU Wire to 48V PSU
    - AC.TO-48V-PSU: [1-3]
    - FB.
    - -->
    - 48V-PSU: [1-3]


  # VFD Power
  - # Contactor to Wire
    - CONTACTOR: [1,2]
    - <--
    - FB.
    - AC.TO-VFD: [1,2]

  - # Wire L to Ext
    - AC.TO-VFD: 1
    - FB.
    - -->
    - VFD: 1

  - # Wire N to Ext
    - AC.TO-VFD: 2
    - FB.
    - -->
    - VFD: 2

  - # PE to Wire PE
    - WAGO5.AC-PE: 1
    - <--
    - FB.
    - AC.TO-VFD: 3
    - FB.
    - -->
    - VFD: 7

  - # Emergency Stop to Contactor
    - EXT.EMERGENCY-STOP-IN: 1
    - -->
    - CONTACTOR: 7

  - # Contactor to PSU GND
    - CONTACTOR: 8
    - <--
    - EXT.EMERGENCY-STOP-OUT: 1